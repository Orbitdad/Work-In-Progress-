<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Work in Progress</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      color: #00f7ff;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #ccc;
    }

    p {
      font-size: 1rem;
      margin-bottom: 30px;
      color: #888;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      border: 2px solid #00f7ff;
      color: #00f7ff;
      text-decoration: none;
      border-radius: 30px;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #00f7ff;
      color: #000;
      box-shadow: 0 0 15px #00f7ff;
    }

    /* subtle glowing animation */
    h1 {
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 5px #00f7ff;
      }
      to {
        text-shadow: 0 0 20px #00f7ff;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚧 WIP</h1>
    <h2>Work in Progress</h2>
    <p>This section is currently under development.<br>
       Come back soon or explore the rest of the portfolio.</p>

    <a href="/" class="btn">← Go Back to Portfolio</a>
  </div>
</body>
</html>
